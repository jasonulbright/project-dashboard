<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A8C"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E7F0FF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#sheen)"/>

  <!-- portfolio tile grid: 2x2 rounded cards -->
  <g>
    <rect x="48"  y="48"  width="72" height="72" rx="15" fill="url(#card)"/>
    <rect x="136" y="48"  width="72" height="72" rx="15" fill="url(#card)"/>
    <rect x="48"  y="136" width="72" height="72" rx="15" fill="url(#card)"/>
    <rect x="136" y="136" width="72" height="72" rx="15" fill="url(#card)"/>

    <!-- faint content lines to read as cards at large sizes -->
    <g fill="#9DB6E0" opacity="0.55">
      <rect x="60"  y="150" width="40" height="7" rx="3.5"/>
      <rect x="60"  y="166" width="28" height="7" rx="3.5"/>
      <rect x="148" y="150" width="40" height="7" rx="3.5"/>
      <rect x="148" y="166" width="28" height="7" rx="3.5"/>
      <rect x="60"  y="62"  width="40" height="7" rx="3.5"/>
      <rect x="60"  y="78"  width="28" height="7" rx="3.5"/>
    </g>

    <!-- amber status dot: the "needs attention" motif from the dashboard itself -->
    <circle cx="190" cy="70" r="12" fill="#E8A317"/>
  </g>
</svg>
